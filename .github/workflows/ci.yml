# =============================================================================
# ScholarShelf – Continuous Integration & Build Pipeline
# =============================================================================
# Workflow Overview:
#   • Triggers: Push to main/develop branches, or pull requests to those branches
#   • Environment: Java 17 + Gradle on Ubuntu Latest
#   • Database: PostgreSQL 15 with health checks for integration tests
#   • Pipeline Stages:
#       1. Setup & Validation (checkout, JDK, Gradle wrapper)
#       2. Build (compile & assemble JAR, skip tests)
#       3. Test (run full test suite with live PostgreSQL)
#       4. Reporting (publish reports & upload artifacts)
# =============================================================================

name: CI – Build & Test

# ═════════════════════════════════════════════════════════════════════════════
# WORKFLOW TRIGGERS
# ═════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# ═════════════════════════════════════════════════════════════════════════════
# JOB DEFINITION
# ═════════════════════════════════════════════════════════════════════════════

jobs:
  build-and-test:
    name: Build & Test (Java 17 / Gradle)
    runs-on: ubuntu-latest

    # ═══════════════════════════════════════════════════════════════════════════
    # BACKING SERVICES
    # ═══════════════════════════════════════════════════════════════════════════
    # PostgreSQL 15 container spun up automatically for integration tests.
    # The @SpringBootTest context-load test requires a live database instance.
    # Health checks ensure DB readiness before pipeline steps begin.

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       ScholarShelfDB
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: admin
        options: >-
          --health-cmd "pg_isready -U postgres -d ScholarShelfDB"
          --health-interval 10s
          --health-timeout  5s
          --health-retries  5
        ports:
          - 5432:5432

    # ═══════════════════════════════════════════════════════════════════════════
    # ENVIRONMENT VARIABLES
    # ═══════════════════════════════════════════════════════════════════════════
    # Database config uses local service. Cloudinary secrets loaded from 
    # repository Secrets (GitHub Settings → Secrets → Actions).
    # Spring Boot picks them up via ${ENV_VAR:fallback} syntax.

    env:
      # Database Configuration
      SPRING_DATASOURCE_URL:           jdbc:postgresql://localhost:5432/ScholarShelfDB
      SPRING_DATASOURCE_USERNAME:      postgres
      SPRING_DATASOURCE_PASSWORD:      admin
      SPRING_JPA_HIBERNATE_DDL_AUTO:   update

      # Cloudinary Configuration (required for Spring context initialization)
      CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}

    # ═══════════════════════════════════════════════════════════════════════════
    # PIPELINE STEPS
    # ═══════════════════════════════════════════════════════════════════════════

    steps:

      # ─────────────────────────────────────────────────────────────────────────
      # STAGE 1: SETUP & VALIDATION
      # ─────────────────────────────────────────────────────────────────────────

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      # ─────────────────────────────────────────────────────────────────────────
      # STAGE 2: BUILD
      # ─────────────────────────────────────────────────────────────────────────

      - name: Build with Gradle (compile + assemble)
        run: ./gradlew clean build -x test --no-daemon

      # ─────────────────────────────────────────────────────────────────────────
      # STAGE 3: TEST
      # ─────────────────────────────────────────────────────────────────────────

      - name: Run test suite
        run: ./gradlew test --no-daemon

      # ─────────────────────────────────────────────────────────────────────────
      # STAGE 4: REPORTING & ARTIFACTS
      # ─────────────────────────────────────────────────────────────────────────

      - name: Publish JUnit test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: build/reports/tests/test/**/*.xml
          check_name:   JUnit Test Report

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name:           test-report-html
          path:           build/reports/tests/test/
          retention-days: 7

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name:           build-logs
          path:           build/reports/problems/
          retention-days: 7

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name:           scholarshelf-app-jar
          path:           build/libs/*.jar
          retention-days: 30
