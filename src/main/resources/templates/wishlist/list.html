<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h2><i class="bi bi-heart"></i> My Wishlist</h2>
        <hr>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" th:if="${!#lists.isEmpty(books)}">
            <div class="col" th:each="book : ${books}">
                <div class="card h-100 shadow-sm">
                    <img th:src="${book.imageUrl != null && !book.imageUrl.isEmpty()} ? ${book.imageUrl} : 'https://via.placeholder.com/300x400?text=No+Image'"
                         class="card-img-top" alt="Book cover" style="height: 250px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title fw-bold" th:text="${book.title}">Title</h6>
                        <p class="card-text text-muted small"><i class="bi bi-person"></i> <span th:text="${book.author}">Author</span></p>
                        <div class="mt-auto">
                            <span class="fw-bold text-success">$<span th:text="${#numbers.formatDecimal(book.price, 1, 2)}">0</span></span>
                            <div class="mt-2">
                                <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-sm btn-primary">View</a>
                                <form th:action="@{/buyer/wishlist/remove/{id}(id=${book.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-heart-fill"></i> Remove</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(books)}" class="text-center py-5">
            <i class="bi bi-heart display-1 text-muted"></i>
            <p class="text-muted mt-3">Your wishlist is empty.</p>
            <a th:href="@{/books}" class="btn btn-primary"><i class="bi bi-search"></i> Browse Books</a>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
