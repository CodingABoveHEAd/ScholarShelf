<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h2><i class="bi bi-chat-dots"></i> Messages
            <span th:if="${unreadCount > 0}" class="badge bg-danger" th:text="${unreadCount}">0</span>
        </h2>
        <hr>

        <div class="list-group" th:if="${!#lists.isEmpty(chatPartners)}">
            <a th:each="partner : ${chatPartners}"
               th:href="@{/messages/{id}(id=${partner.id})}"
               class="list-group-item list-group-item-action d-flex align-items-center py-3">
                <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center me-3"
                     style="width: 50px; height: 50px;">
                    <i class="bi bi-person-fill text-primary fs-4"></i>
                </div>
                <div>
                    <h6 class="mb-0" th:text="${partner.fullName}">User Name</h6>
                    <small class="text-muted" th:text="${partner.role}">Role</small>
                </div>
                <i class="bi bi-chevron-right ms-auto text-muted"></i>
            </a>
        </div>

        <div th:if="${#lists.isEmpty(chatPartners)}" class="text-center py-5">
            <i class="bi bi-chat-dots display-1 text-muted"></i>
            <p class="text-muted mt-3">No conversations yet. Start by messaging a seller from a book listing!</p>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
