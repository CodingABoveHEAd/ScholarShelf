.<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <div class="d-flex align-items-center mb-3">
            <a th:href="@{/messages}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
            <h4 class="mb-0"><i class="bi bi-chat-dots"></i> Chat with <span th:text="${otherUser.fullName}">User</span></h4>
            <span class="badge bg-secondary ms-2" th:text="${otherUser.role}">Role</span>
        </div>
        <hr>

        <!-- Messages -->
        <div class="card mb-3" style="max-height: 500px; overflow-y: auto;" id="chatBox">
            <div class="card-body">
                <div th:each="msg : ${messages}" class="mb-3">
                    <div th:classappend="${msg.senderName != otherUser.fullName} ? 'text-end' : ''">
                        <div class="d-inline-block p-2 rounded-3"
                             th:classappend="${msg.senderName != otherUser.fullName} ? 'bg-primary text-white' : 'bg-light'">
                            <p class="mb-0" th:text="${msg.content}">Message</p>
                        </div>
                        <br>
                        <small class="text-muted" th:text="${#temporals.format(msg.sentAt, 'MMM dd, HH:mm')}">Time</small>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-3">
                    <p>No messages yet. Start the conversation!</p>
                </div>
            </div>
        </div>

        <!-- Send Message Form -->
        <form th:action="@{/messages/{id}(id=${otherUser.id})}" th:object="${messageRequest}" method="post">
            <div class="input-group">
                <input type="text" class="form-control" th:field="*{content}" placeholder="Type your message..." required>
                <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Send</button>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>

<script>
    // Auto-scroll chat to bottom
    document.addEventListener('DOMContentLoaded', function() {
        var chatBox = document.getElementById('chatBox');
        if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>
</body>
</html>
