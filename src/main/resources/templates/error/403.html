<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<main class="flex-grow-1">
    <div class="container py-5 text-center">
        <i class="bi bi-shield-lock display-1 text-warning"></i>
        <h1 class="mt-3">403 - Access Denied</h1>
        <p class="text-muted" th:text="${errorMessage != null} ? ${errorMessage} : 'You do not have permission to access this page.'">Error</p>
        <div class="mt-4">
            <a th:href="@{/}" class="btn btn-primary"><i class="bi bi-house"></i> Go Home</a>
        </div>
    </div>
</main>
<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
