<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<main class="flex-grow-1">
    <div class="container py-5 text-center">
        <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
        <h1 class="mt-3">400 - Bad Request</h1>
        <p class="text-muted" th:text="${errorMessage != null} ? ${errorMessage} : 'The request could not be understood.'">Error</p>
        <div th:if="${validationErrors}" class="mt-3">
            <div class="alert alert-danger text-start d-inline-block">
                <ul class="mb-0">
                    <li th:each="entry : ${validationErrors}" th:text="${entry.key + ': ' + entry.value}">error</li>
                </ul>
            </div>
        </div>
        <div class="mt-4">
            <a th:href="@{/}" class="btn btn-primary"><i class="bi bi-house"></i> Go Home</a>
        </div>
    </div>
</main>
<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
