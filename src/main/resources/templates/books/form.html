<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h2 th:text="${editing != null && editing} ? 'Edit Book' : 'Add New Book'"><i class="bi bi-plus-circle"></i> Add Book</h2>
        <hr>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="${editing != null && editing} ? @{/seller/books/{id}(id=${bookId})} : @{/seller/books}"
              th:object="${bookRequest}" method="post" enctype="multipart/form-data" class="row g-3">

            <div class="col-md-6">
                <label for="title" class="form-label">Title *</label>
                <input type="text" class="form-control" id="title" th:field="*{title}"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="col-md-6">
                <label for="author" class="form-label">Author *</label>
                <input type="text" class="form-control" id="author" th:field="*{author}"
                       th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
            </div>

            <div class="col-md-4">
                <label for="isbn" class="form-label">ISBN</label>
                <input type="text" class="form-control" id="isbn" th:field="*{isbn}">
            </div>

            <div class="col-md-4">
                <label for="price" class="form-label">Price ($) *</label>
                <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="col-md-4">
                <label for="quantity" class="form-label">Quantity (Stock) *</label>
                <input type="number" min="1" class="form-control" id="quantity" th:field="*{quantity}"
                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
            </div>

            <div class="col-md-4">
                <label for="bookCondition" class="form-label">Condition *</label>
                <select class="form-select" id="bookCondition" th:field="*{bookCondition}">
                    <option value="">-- Select --</option>
                    <option value="NEW">New</option>
                    <option value="LIKE_NEW">Like New</option>
                    <option value="GOOD">Good</option>
                    <option value="FAIR">Fair</option>
                    <option value="POOR">Poor</option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="categoryId" class="form-label">Category *</label>
                <select class="form-select" id="categoryId" th:field="*{categoryId}">
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="imageFile" class="form-label">Cover Image</label>
                <input type="file" class="form-control" id="imageFile" name="imageFile"
                       accept="image/jpeg,image/png,image/gif,image/webp">
                <div class="form-text">JPEG, PNG, GIF or WebP · max 10 MB</div>
                <div th:if="${existingImageUrl != null && !existingImageUrl.isEmpty()}" class="mt-2">
                    <img th:src="${existingImageUrl}" alt="Current cover"
                         style="height: 90px; object-fit: cover; border-radius: 6px;" class="border">
                    <small class="d-block text-muted mt-1">Upload a new file to replace the current image</small>
                    <input type="hidden" name="existingImageUrl" th:value="${existingImageUrl}">
                </div>
            </div>

            <div class="col-12">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="4"
                          placeholder="Describe the book..."></textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i th:classappend="${editing != null && editing} ? 'bi-pencil' : 'bi-plus-circle'" class="bi"></i>
                    <span th:text="${editing != null && editing} ? 'Update Book' : 'Add Book'">Submit</span>
                </button>
                <a th:href="@{/seller/books}" class="btn btn-secondary ms-2">Cancel</a>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
