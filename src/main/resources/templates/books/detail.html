<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <div class="row">
            <!-- Book Image -->
            <div class="col-md-4 mb-4">
                <img th:src="${book.imageUrl != null && !book.imageUrl.isEmpty()} ? ${book.imageUrl} : 'https://via.placeholder.com/400x500?text=No+Image'"
                     class="img-fluid rounded shadow" alt="Book cover">
            </div>

            <!-- Book Details -->
            <div class="col-md-8">
                <h2 class="fw-bold" th:text="${book.title}">Book Title</h2>
                <p class="text-muted fs-5"><i class="bi bi-person"></i> <span th:text="${book.author}">Author</span></p>

                <div class="mb-3">
                    <span class="badge bg-info fs-6" th:text="${book.bookCondition}">Condition</span>
                    <span class="badge bg-secondary fs-6" th:text="${book.categoryName}">Category</span>
                    <span class="badge fs-6" th:classappend="${book.available} ? 'bg-success' : 'bg-danger'"
                          th:text="${book.available} ? 'Available' : 'Sold'"></span>
                </div>

                <div class="mb-3" th:if="${averageRating != null && averageRating > 0}">
                    <span th:each="i : ${#numbers.sequence(1, 5)}">
                        <i th:classappend="${i <= averageRating} ? 'bi-star-fill text-warning' : 'bi-star text-muted'" class="bi"></i>
                    </span>
                    <span class="ms-2 text-muted" th:text="${#numbers.formatDecimal(averageRating, 1, 1)} + ' / 5.0'"></span>
                    <span class="text-muted" th:text="'(' + ${#lists.size(reviews)} + ' reviews)'"></span>
                </div>

                <h3 class="text-success fw-bold">$<span th:text="${#numbers.formatDecimal(book.price, 1, 2)}">0.00</span></h3>

                <p class="mt-3" th:text="${book.description}">Book description</p>

                <table class="table table-sm table-borderless w-auto mt-3">
                    <tr th:if="${book.isbn != null && !book.isbn.isEmpty()}">
                        <td class="fw-bold">ISBN:</td>
                        <td th:text="${book.isbn}"></td>
                    </tr>
                    <tr>
                        <td class="fw-bold">Seller:</td>
                        <td>
                            <span th:text="${book.sellerName}">Seller</span>
                            <a th:href="@{/messages/{id}(id=${book.sellerId})}" class="btn btn-sm btn-outline-primary ms-2"
                               sec:authorize="isAuthenticated()">
                                <i class="bi bi-chat-dots"></i> Chat
                            </a>
                        </td>
                    </tr>
                </table>

                <!-- Action Buttons -->
                <div class="mt-4" sec:authorize="hasRole('BUYER')">
                    <!-- Exchange Request -->
                    <div th:if="${book.available}" class="card border-primary mb-3">
                        <div class="card-body">
                            <h5 class="card-title"><i class="bi bi-arrow-left-right"></i> Request Exchange</h5>
                            <form th:action="@{/buyer/exchange/request}" method="post">
                                <input type="hidden" name="bookId" th:value="${book.id}">
                                <div class="mb-2">
                                    <textarea name="message" class="form-control" rows="2"
                                              placeholder="Write a message to the seller..."></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Send Request</button>
                            </form>
                        </div>
                    </div>

                    <!-- Wishlist -->
                    <div th:if="${inWishlist != null && inWishlist}">
                        <form th:action="@{/buyer/wishlist/remove/{id}(id=${book.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger"><i class="bi bi-heart-fill"></i> Remove from Wishlist</button>
                        </form>
                    </div>
                    <div th:if="${inWishlist == null || !inWishlist}">
                        <form th:action="@{/buyer/wishlist/add/{id}(id=${book.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger"><i class="bi bi-heart"></i> Add to Wishlist</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reviews Section -->
        <div class="mt-5">
            <h4><i class="bi bi-chat-square-text"></i> Reviews</h4>
            <hr>

            <!-- Review Form -->
            <div class="card mb-4" sec:authorize="isAuthenticated()">
                <div class="card-body">
                    <h5>Write a Review</h5>
                    <form th:action="@{/books/{id}/reviews(id=${book.id})}" method="post">
                        <div class="mb-2">
                            <label class="form-label">Rating</label>
                            <select name="rating" class="form-select w-auto">
                                <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                                <option value="4">⭐⭐⭐⭐ (4)</option>
                                <option value="3">⭐⭐⭐ (3)</option>
                                <option value="2">⭐⭐ (2)</option>
                                <option value="1">⭐ (1)</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <textarea name="comment" class="form-control" rows="3" placeholder="Your review..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Submit Review</button>
                    </form>
                </div>
            </div>

            <!-- Review List -->
            <div th:each="review : ${reviews}" class="card mb-3">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <h6 class="fw-bold" th:text="${review.reviewerName}">Reviewer</h6>
                        <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Date</small>
                    </div>
                    <div class="mb-2">
                        <span th:each="i : ${#numbers.sequence(1, 5)}">
                            <i th:classappend="${i <= review.rating} ? 'bi-star-fill text-warning' : 'bi-star text-muted'" class="bi"></i>
                        </span>
                    </div>
                    <p th:text="${review.comment}" class="mb-0">Comment</p>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-3 text-muted">
                <p>No reviews yet. Be the first to review!</p>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
