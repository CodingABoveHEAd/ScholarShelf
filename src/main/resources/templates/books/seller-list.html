<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-collection"></i> My Book Listings</h2>
            <a th:href="@{/seller/books/new}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add New Book</a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover" th:if="${!#lists.isEmpty(books)}">
                <thead class="table-dark">
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Category</th>
                        <th>Condition</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book : ${books}">
                        <td><a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}">Title</a></td>
                        <td th:text="${book.author}">Author</td>
                        <td><span class="badge bg-secondary" th:text="${book.categoryName}">Cat</span></td>
                        <td><span class="badge bg-info" th:text="${book.bookCondition}">Cond</span></td>
                        <td class="text-success fw-bold">$<span th:text="${#numbers.formatDecimal(book.price, 1, 2)}">0</span></td>
                        <td>
                            <span class="badge" th:classappend="${book.available} ? 'bg-success' : 'bg-danger'"
                                  th:text="${book.available} ? 'Available' : 'Sold'"></span>
                        </td>
                        <td>
                            <a th:href="@{/seller/books/{id}/edit(id=${book.id})}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/seller/books/{id}/delete(id=${book.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Are you sure you want to delete this book?')">
                                <button type="submit" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(books)}" class="text-center py-5">
            <i class="bi bi-inbox display-1 text-muted"></i>
            <p class="text-muted mt-3">You haven't listed any books yet.</p>
            <a th:href="@{/seller/books/new}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add Your First Book</a>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
