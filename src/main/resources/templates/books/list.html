<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h2 class="mb-4"><i class="bi bi-search"></i> Browse Books</h2>

        <!-- Search & Filter -->
        <form th:action="@{/books}" method="get" class="row g-3 mb-4">
            <div class="col-md-5">
                <input type="text" name="keyword" class="form-control" placeholder="Search by title or author..."
                       th:value="${keyword}">
            </div>
            <div class="col-md-4">
                <select name="categoryId" class="form-select">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                            th:selected="${selectedCategoryId != null && selectedCategoryId == cat.id}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search"></i> Search</button>
            </div>
        </form>

        <!-- Book Grid -->
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col" th:each="book : ${books.content}">
                <div class="card h-100 shadow-sm book-card">
                    <img th:src="${book.imageUrl != null && !book.imageUrl.isEmpty()} ? ${book.imageUrl} : 'https://via.placeholder.com/300x400?text=No+Image'"
                         class="card-img-top" alt="Book cover" style="height: 250px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title fw-bold" th:text="${book.title}">Title</h6>
                        <p class="card-text text-muted small mb-1"><i class="bi bi-person"></i> <span th:text="${book.author}">Author</span></p>
                        <p class="card-text small mb-1">
                            <span class="badge bg-info" th:text="${book.bookCondition}">Condition</span>
                            <span class="badge bg-secondary" th:text="${book.categoryName}">Category</span>
                        </p>
                        <p class="card-text small text-muted mb-1">
                            📦 <span th:text="${book.quantity}">0</span> available
                        </p>
                        <p class="card-text small mb-1" th:if="${book.averageRating != null && book.averageRating > 0}">
                            <i class="bi bi-star-fill text-warning"></i>
                            <span th:text="${#numbers.formatDecimal(book.averageRating, 1, 1)}">0.0</span>
                            <span class="text-muted" th:text="'(' + ${book.reviewCount} + ' reviews)'"></span>
                        </p>
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold text-success fs-5">$<span th:text="${#numbers.formatDecimal(book.price, 1, 2)}">0.00</span></span>
                                <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-sm btn-primary">View</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${books.content.isEmpty()}" class="text-center py-5">
            <i class="bi bi-inbox display-1 text-muted"></i>
            <p class="text-muted mt-3">No books found matching your criteria.</p>
        </div>

        <!-- Pagination -->
        <nav th:if="${books.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${books.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/books(keyword=${keyword}, categoryId=${selectedCategoryId}, page=${books.number - 1})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, books.totalPages - 1)}"
                    th:classappend="${i == books.number} ? 'active'">
                    <a class="page-link" th:href="@{/books(keyword=${keyword}, categoryId=${selectedCategoryId}, page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${books.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/books(keyword=${keyword}, categoryId=${selectedCategoryId}, page=${books.number + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
