<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container-fluid py-4">
        <h2 class="fw-bold mb-4"><i class="bi bi-clipboard-data"></i> Orders & Stock Management</h2>

        <!-- Stock Report -->
        <div class="card mb-5 shadow-sm">
            <div class="card-header bg-warning text-dark fw-bold">
                <i class="bi bi-box-seam"></i> Book Stock Report
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Book Title</th>
                                <th class="text-center">Remaining Stock</th>
                                <th class="text-center">Total Ordered</th>
                                <th class="text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${stockReport}">
                                <td>
                                    <a th:href="@{/books/{id}(id=${s.bookId})}" th:text="${s.bookTitle}" class="text-decoration-none fw-semibold"></a>
                                </td>
                                <td class="text-center">
                                    <span class="badge fs-6" th:classappend="${s.stockCount > 0} ? 'bg-success' : 'bg-danger'"
                                          th:text="${s.stockCount}"></span>
                                </td>
                                <td class="text-center" th:text="${s.totalOrdered}"></td>
                                <td class="text-center">
                                    <span class="badge" th:classappend="${s.available} ? 'bg-success' : 'bg-secondary'"
                                          th:text="${s.available} ? 'Available' : 'Out of Stock'"></span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(stockReport)}">
                                <td colspan="4" class="text-center text-muted py-3">No books found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- All Orders -->
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white fw-bold">
                <i class="bi bi-bag-fill"></i> All Orders (<span th:text="${#lists.size(orders)}"></span>)
            </div>
            <div class="card-body p-0">
                <div th:if="${#lists.isEmpty(orders)}" class="text-center py-4 text-muted">
                    No orders placed yet.
                </div>
                <div class="accordion" id="ordersAccordion" th:unless="${#lists.isEmpty(orders)}">
                    <div class="accordion-item" th:each="order, iter : ${orders}">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button"
                                    data-bs-toggle="collapse"
                                    th:data-bs-target="'#order' + ${order.id}"
                                    aria-expanded="false">
                                <span class="fw-bold me-3">Order #<span th:text="${order.id}"></span></span>
                                <span class="text-muted me-3" th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy HH:mm')}"></span>
                                <span class="me-3"><strong th:text="${order.buyerName}"></strong>
                                    <small class="text-muted" th:text="'(' + ${order.buyerEmail} + ')'"></small></span>
                                <span class="badge ms-auto me-3"
                                      th:classappend="${order.status.name() == 'ACCEPTED'} ? 'bg-success' :
                                                      (${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                      (${order.status.name() == 'PLACED'} ? 'bg-info' : 'bg-secondary'))"
                                      th:text="${order.status}"></span>
                                <span class="fw-bold text-success">$<span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span></span>
                            </button>
                        </h2>
                        <div th:id="'order' + ${order.id}" class="accordion-collapse collapse" data-bs-parent="#ordersAccordion">
                            <div class="accordion-body p-0">
                                <table class="table table-sm mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Book</th>
                                            <th class="text-center">Qty Ordered</th>
                                            <th class="text-center">Unit Price</th>
                                            <th class="text-center">Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${order.items}">
                                            <td>
                                                <a th:href="@{/books/{id}(id=${item.bookId})}" th:text="${item.bookTitle}" class="text-decoration-none"></a>
                                                <div class="text-muted small" th:text="${item.bookAuthor}"></div>
                                            </td>
                                            <td class="text-center fw-bold" th:text="${item.orderedQuantity}"></td>
                                            <td class="text-center" th:text="'$' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)}"></td>
                                            <td class="text-center fw-bold text-success" th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></td>
                                        </tr>
                                    </tbody>
                                    <tfoot>
                                        <tr class="table-light">
                                            <td colspan="3" class="text-end fw-bold">Total:</td>
                                            <td class="text-center fw-bold text-success">$<span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span></td>
                                        </tr>
                                    </tfoot>
                                </table>
                                <!-- Admin Action Buttons -->
                                <div class="p-3 d-flex gap-2 justify-content-end border-top">
                                    <form th:if="${order.status.name() == 'PENDING' || order.status.name() == 'PLACED'}"
                                          th:action="@{/admin/orders/{id}/accept(id=${order.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-success btn-sm">
                                            <i class="bi bi-check-circle-fill"></i> Accept Order
                                        </button>
                                    </form>
                                    <form th:if="${order.status.name() != 'CANCELLED'}"
                                          th:action="@{/admin/orders/{id}/cancel(id=${order.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-danger btn-sm"
                                                onclick="return confirm('Are you sure you want to cancel this order?')">
                                            <i class="bi bi-x-circle"></i> Cancel Order
                                        </button>
                                    </form>
                                    <span th:if="${order.status.name() == 'CANCELLED'}" class="text-muted small align-self-center">
                                        <i class="bi bi-info-circle"></i> This order has been cancelled
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
