<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>

<main class="flex-grow-1">
    <div class="container py-4" style="max-width: 860px;">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li class="breadcrumb-item"><a th:href="@{/admin/books}">Books</a></li>
                <li class="breadcrumb-item active"
                    th:text="${editing} ? 'Edit Book' : 'New Book'">Book</li>
            </ol>
        </nav>

        <h2 class="mb-1">
            <i th:classappend="${editing} ? 'bi-pencil-square' : 'bi-plus-circle'" class="bi"></i>
            <span th:text="${editing} ? 'Edit Book' : 'Add New Book'">Book</span>
        </h2>
        <p class="text-muted mb-4">All fields marked with * are required.</p>
        <hr>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${sellerError}" class="alert alert-warning" th:text="${sellerError}"></div>

        <form th:action="${editing} ? @{/admin/books/{id}/edit(id=${bookId})} : @{/admin/books/new}"
              th:object="${bookRequest}"
              method="post"
              enctype="multipart/form-data"
              class="row g-3">

            <!-- Seller (only shown for new books; on edit it's read-only info) -->
            <div class="col-12" th:if="${!editing}">
                <label for="sellerId" class="form-label fw-semibold">Assign to Seller *</label>
                <select class="form-select" id="sellerId" name="sellerId" required>
                    <option value="">— Select a seller —</option>
                    <option th:each="s : ${sellers}"
                            th:value="${s.id}"
                            th:text="${s.fullName} + ' (' + ${s.email} + ')'"></option>
                </select>
            </div>

            <div class="col-12" th:if="${editing}">
                <p class="mb-1 text-muted small">
                    <i class="bi bi-shop"></i> Currently assigned seller:
                    <span th:if="${sellers != null}" th:each="s : ${sellers}">
                        <span th:if="${s.id == sellerId}" th:text="${s.fullName} + ' (' + ${s.email} + ')'"></span>
                    </span>
                </p>
                <!-- Hidden to preserve sellerId on edit (not needed by adminUpdateBook) -->
            </div>

            <!-- Title / Author -->
            <div class="col-md-6">
                <label for="title" class="form-label fw-semibold">Title *</label>
                <input type="text" class="form-control" id="title" th:field="*{title}"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                       placeholder="Book title">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="col-md-6">
                <label for="author" class="form-label fw-semibold">Author *</label>
                <input type="text" class="form-control" id="author" th:field="*{author}"
                       th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'"
                       placeholder="Author name">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
            </div>

            <!-- ISBN / Price / Condition -->
            <div class="col-md-4">
                <label for="isbn" class="form-label fw-semibold">ISBN</label>
                <input type="text" class="form-control" id="isbn" th:field="*{isbn}" placeholder="978-…">
            </div>

            <div class="col-md-4">
                <label for="price" class="form-label fw-semibold">Price ($) *</label>
                <input type="number" step="0.01" min="0" class="form-control" id="price" th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                       placeholder="0.00">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="col-md-4">
                <label for="quantity" class="form-label fw-semibold">Quantity (Stock) *</label>
                <input type="number" min="1" class="form-control" id="quantity" th:field="*{quantity}"
                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                       placeholder="1">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
            </div>

            <div class="col-md-4">
                <label for="bookCondition" class="form-label fw-semibold">Condition *</label>
                <select class="form-select" id="bookCondition" th:field="*{bookCondition}">
                    <option value="">— Select —</option>
                    <option value="NEW">New</option>
                    <option value="LIKE_NEW">Like New</option>
                    <option value="GOOD">Good</option>
                    <option value="FAIR">Fair</option>
                    <option value="POOR">Poor</option>
                </select>
            </div>

            <!-- Category -->
            <div class="col-md-6">
                <label for="categoryId" class="form-label fw-semibold">Category *</label>
                <select class="form-select" id="categoryId" th:field="*{categoryId}">
                    <option value="">— Select Category —</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>

            <!-- Image Upload -->
            <div class="col-md-6">
                <label for="imageFile" class="form-label fw-semibold">Cover Image</label>
                <input type="file" class="form-control" id="imageFile" name="imageFile"
                       accept="image/jpeg,image/png,image/gif,image/webp">
                <div class="form-text">JPEG, PNG, GIF or WebP · max 10 MB</div>

                <!-- Preview existing image when editing -->
                <div th:if="${existingImageUrl != null && !existingImageUrl.isEmpty()}" class="mt-2">
                    <img th:src="${existingImageUrl}" alt="Current cover"
                         style="height: 100px; object-fit: cover; border-radius: 6px;" class="border">
                    <small class="d-block text-muted mt-1">Current image — upload a new file to replace it</small>
                    <input type="hidden" name="existingImageUrl" th:value="${existingImageUrl}">
                </div>
            </div>

            <!-- Description -->
            <div class="col-12">
                <label for="description" class="form-label fw-semibold">Description</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="4"
                          placeholder="Describe the book condition, edition, notes…"></textarea>
            </div>

            <!-- Actions -->
            <div class="col-12 d-flex gap-2 pt-2">
                <button type="submit" class="btn btn-success px-4">
                    <i th:classappend="${editing} ? 'bi-check-circle' : 'bi-plus-circle'" class="bi"></i>
                    <span th:text="${editing} ? ' Save Changes' : ' Create Book'">Submit</span>
                </button>
                <a th:href="@{/admin/books}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
