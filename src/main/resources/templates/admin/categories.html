<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h2><i class="bi bi-tags"></i> Category Management</h2>
        <hr>

        <div class="row">
            <!-- Add Category Form -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Add Category</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/categories}" th:object="${categoryRequest}" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Category Name</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-circle"></i> Create</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Category List -->
            <div class="col-md-8">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Books</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat : ${categories}">
                                <td th:text="${cat.id}">1</td>
                                <td class="fw-bold" th:text="${cat.name}">Name</td>
                                <td th:text="${cat.description}">Desc</td>
                                <td><span class="badge bg-info" th:text="${cat.bookCount}">0</span></td>
                                <td>
                                    <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}" method="post"
                                          onsubmit="return confirm('Delete this category?')">
                                        <button type="submit" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${#lists.isEmpty(categories)}" class="text-center py-3 text-muted">
                    <p>No categories created yet.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
