<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{layout/base :: nav}"></div>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h2 class="fw-bold mb-4"><i class="bi bi-bag-fill"></i> My Orders</h2>

        <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5 text-muted">
            <i class="bi bi-bag-x display-3"></i>
            <p class="mt-3 fs-5">You haven't placed any orders yet.</p>
            <a href="/books" class="btn btn-primary mt-2">Browse Books</a>
        </div>

        <div th:each="order : ${orders}" class="card mb-4 shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <span class="fw-bold">Order #<span th:text="${order.id}"></span></span>
                    <span class="ms-3 text-muted"
                          th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy HH:mm')}"></span>
                </div>
                <div>
                    <span class="badge fs-6"
                          th:classappend="${order.status.name() == 'PLACED'} ? 'bg-success' : 'bg-secondary'"
                          th:text="${order.status}"></span>
                </div>
            </div>
            <div class="card-body">
                <div th:each="item : ${order.items}" class="d-flex align-items-center mb-3 pb-3 border-bottom">
                    <img th:src="${item.bookImageUrl != null && !item.bookImageUrl.isEmpty()} ? ${item.bookImageUrl} : 'https://via.placeholder.com/80x100?text=Book'"
                         class="rounded me-3" style="width:60px;height:80px;object-fit:cover;" alt="Book">
                    <div class="flex-grow-1">
                        <div class="fw-bold" th:text="${item.bookTitle}">Title</div>
                        <div class="text-muted small" th:text="${item.bookAuthor}">Author</div>
                        <div class="mt-1">
                            <span class="badge bg-light text-dark border">
                                Qty: <span th:text="${item.orderedQuantity}"></span>
                            </span>
                            <span class="ms-2 text-muted small">
                                × $<span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}"></span>
                            </span>
                        </div>
                    </div>
                    <div class="text-end fw-bold text-success">
                        $<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}"></span>
                    </div>
                </div>
                <div class="d-flex justify-content-end">
                    <span class="fw-bold fs-5">Total: $<span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span></span>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
