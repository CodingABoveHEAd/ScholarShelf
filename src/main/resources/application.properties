# ========================
# DataSource Configuration (Docker-friendly, local fallback)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ScholarShelfDB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ========================
# SQL Init (data.sql)
# ========================
spring.sql.init.mode=never

# ========================
# File Upload (Multipart)
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Cloudinary
# ========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dmnfdlzy1}
cloudinary.api-key=${CLOUDINARY_API_KEY:759895177241212}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:-zt7w5PmhLmCzgPgLT9VfXNNito}
cloudinary.folder=scholarshelf/books

# ========================
# Server
# ========================
server.port=${SERVER_PORT:8080}

# ========================
# JWT Configuration
# ========================
app.jwt.secret=c2Nob2xhcnNoZWxmLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjY=
app.jwt.expiration-ms=86400000

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# ========================
# Logging
# ========================
logging.level.com.niloy.scholarshelf=DEBUG
logging.level.org.springframework.security=INFO

# ========================
# Thymeleaf
# ========================
spring.thymeleaf.cache=false